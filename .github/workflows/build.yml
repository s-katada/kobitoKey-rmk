name: Build Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y liblzma-dev libclang-dev

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7em-none-eabihf
          components: llvm-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install tools
        run: cargo install flip-link cargo-binutils cargo-hex-to-uf2

      - name: Build central
        run: cargo build --release --bin central

      - name: Build peripheral
        run: cargo build --release --bin peripheral

      - name: Generate UF2 files
        run: |
          cargo objcopy --release --bin central -- -O ihex rmk-central.hex
          cargo objcopy --release --bin peripheral -- -O ihex rmk-peripheral.hex
          cargo hex-to-uf2 --input-path rmk-central.hex --output-path rmk-central.uf2 --family nrf52840
          cargo hex-to-uf2 --input-path rmk-peripheral.hex --output-path rmk-peripheral.uf2 --family nrf52840

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kobitokey-firmware
          path: |
            rmk-central.uf2
            rmk-peripheral.uf2

name: Build Firmware

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant:
          - { id: shiro, name: "KobitoKey Shiro" }
          - { id: yoru,  name: "KobitoKey Yoru" }
          - { id: yo,    name: "KobitoKey Yo" }

    steps:
      - uses: actions/checkout@v4

      - name: Set BLE device name for variant
        run: |
          sed -i 's/^name = "KobitoKey"/name = "${{ matrix.variant.name }}"/' keyboard.toml
          sed -i 's/^product_name = "KobitoKey"/product_name = "${{ matrix.variant.name }}"/' keyboard.toml

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y liblzma-dev libclang-dev

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: thumbv7em-none-eabihf
          components: llvm-tools

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install tools
        run: cargo install flip-link cargo-binutils cargo-hex-to-uf2

      - name: Build central
        run: cargo build --release --bin central

      - name: Build peripheral
        run: cargo build --release --bin peripheral

      - name: Build reset firmware
        run: cd reset && cargo build --release

      - name: Generate UF2 files
        run: |
          cargo objcopy --release --bin central -- -O ihex central.hex
          cargo objcopy --release --bin peripheral -- -O ihex peripheral.hex
          cargo hex-to-uf2 --input-path central.hex --output-path kobito-key-${{ matrix.variant.id }}-central.uf2 --family nrf52840
          cargo hex-to-uf2 --input-path peripheral.hex --output-path kobito-key-${{ matrix.variant.id }}-peripheral.uf2 --family nrf52840
          rust-objcopy -O ihex reset/target/thumbv7em-none-eabihf/release/kobitokey-reset reset.hex
          cargo hex-to-uf2 --input-path reset.hex --output-path kobito-key-reset.uf2 --family nrf52840

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kobito-key-${{ matrix.variant.id }}
          path: |
            kobito-key-${{ matrix.variant.id }}-central.uf2
            kobito-key-${{ matrix.variant.id }}-peripheral.uf2
            kobito-key-reset.uf2
